function gregorianToHijri(date) {
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  // Convert to Julian Day Number for easy comparison
  const toJD=(yr,mo,da)=>{
    const a=Math.floor((14-mo)/12);
    const Y=yr+4800-a;
    const M=mo+12*a-3;
    return da+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045;
  };
  const jdTarget=toJD(y,m,d);
  // Find which Hijri month we're in
  let best=null;
  for(let i=0;i<UMM_AL_QURA.length;i++){
    const [gy,gm,gd,hy,hm]=UMM_AL_QURA[i];
    const jdStart=toJD(gy,gm,gd);
    if(jdTarget>=jdStart){
      const dayOfMonth=jdTarget-jdStart+1;
      best={day:dayOfMonth,month:hm,year:hy};
    } else break;
  }
  if(best) return best;
  // Fallback approximation
  const approx=Math.floor((jdTarget-1948440)/29.53);
  return {day:1,month:((approx%12)+12)%12+1,year:Math.floor(approx/12)+1};
}

// PRAYER TIME CALC
// ─────────────────────────────────────────────────────────────────────────────
function calcPrayerTimes(lat,lng,date){
  const J=Math.floor(date/86400000)+2440587.5;
  const D=J-2451545;
  const g=(357.529+0.98560028*D)*Math.PI/180;
  const q=(280.459+0.98564736*D)%360;
  const L=(q+360*Math.sin(g)+0.02*360*Math.sin(2*g))*Math.PI/180;
  const e=(23.439-0.00000036*D)*Math.PI/180;
  const RA=Math.atan2(Math.cos(e)*Math.sin(L),Math.cos(L))*12/Math.PI;
  const dec=Math.asin(Math.sin(e)*Math.sin(L));
  const EqT=(q/15-((RA%24+24)%24))*60;
  const transit=12-lng/15-EqT/60;
  const angle=a=>{const v=-Math.sin(a*Math.PI/180)-Math.sin(dec)*Math.sin(lat*Math.PI/180);const c=Math.cos(dec)*Math.cos(lat*Math.PI/180);if(Math.abs(v/c)>1)return null;return Math.acos(v/c)*12/Math.PI;};
  const shadow=f=>{const a=Math.atan(1/(f+Math.tan(Math.abs(lat*Math.PI/180-dec))));const v=Math.sin(a)-Math.sin(dec)*Math.sin(lat*Math.PI/180);const c2=Math.cos(dec)*Math.cos(lat*Math.PI/180);if(Math.abs(v/c2)>1)return null;return Math.acos(v/c2)*12/Math.PI;};
  const fmt=h=>{if(h===null)return"--:--";const t=((h%24)+24)%24;const hh=Math.floor(t);const mm=Math.round((t-hh)*60);return`${String(hh).padStart(2,"0")}:${String(mm<60?mm:59).padStart(2,"0")}`;};
  const fajrA=angle(18),asrT=shadow(1),sunsetA=angle(0.833);
  return{fajr:fajrA?fmt(transit-fajrA):"--:--",dhuhr:fmt(transit),asr:asrT?fmt(transit+asrT):"--:--",maghrib:sunsetA?fmt(transit+sunsetA):"--:--",isha:sunsetA?fmt(transit+sunsetA+1.333):"--:--"};
}

function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const NEON=["#00ff88","#00cfff","#ffd700","#ff8c00","#bf5fff","#ff6b9d"];

function Stars(){
  const s=Array.from({length:55},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()*2.5+0.5,delay:Math.random()*4,dur:Math.random()*3+2}));
  return(<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>{s.map(x=>(<div key={x.id} style={{position:"absolute",left:`${x.x}%`,top:`${x.y}%`,width:x.sz,height:x.sz,borderRadius:"50%",background:"white",opacity:.7,animation:`tw ${x.dur}s ${x.delay}s infinite alternate`}}/>))}<style>{`@keyframes tw{from{opacity:.2}to{opacity:1}}`}</style></div>);
}

function NeonCard({color="#00cfff",onClick,children,style={}}){
  const[h,sh]=useState(false);
  return(<div onClick={onClick} onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} style={{background:"rgba(10,15,35,0.88)",borderRadius:16,border:`2px solid ${color}`,boxShadow:h?`0 0 22px ${color},0 0 44px ${color}55`:`0 0 10px ${color}88`,transition:"all .25s",cursor:onClick?"pointer":"default",transform:h&&onClick?"scale(1.02)":"scale(1)",...style}}>{children}</div>);
}

function AB({arabic,phonetic,trans,color="#ffd700",size=15}){
  return(<div style={{margin:"4px 0"}}><p style={{fontFamily:"'Amiri',serif",color,fontSize:size+5,direction:"rtl",margin:"0 0 2px",lineHeight:1.4}}>{arabic}</p><p style={{color:"rgba(255,255,255,.5)",fontSize:size-3,margin:"0 0 1px",fontStyle:"italic"}}>🔊 {phonetic}</p><p style={{color:"rgba(255,255,255,.35)",fontSize:size-4,margin:0}}>➜ {trans}</p></div>);
}

// Prostration SVG (fully flat, forehead to ground)
function SujudFigure(){
  return(
    <svg width="110" height="70" viewBox="0 0 110 70" fill="none">
      {/* ground line */}
      <line x1="0" y1="63" x2="110" y2="63" stroke="#00cfff" strokeWidth="2" strokeOpacity=".3"/>
      {/* head on ground */}
      <circle cx="12" cy="59" r="8" fill="#00cfff" fillOpacity=".9"/>
      {/* neck + torso flat */}
      <rect x="18" y="53" width="36" height="9" rx="4.5" fill="#00cfff" fillOpacity=".75"/>
      {/* arms stretched forward on ground */}
      <rect x="4" y="60" width="16" height="5" rx="2.5" fill="#00cfff" fillOpacity=".7"/>
      <rect x="4" y="55" width="16" height="5" rx="2.5" fill="#00cfff" fillOpacity=".7"/>
      {/* hips raised */}
      <rect x="50" y="38" width="18" height="10" rx="5" fill="#00cfff" fillOpacity=".75" transform="rotate(-55 50 38)"/>
      {/* thighs back */}
      <rect x="60" y="42" width="22" height="9" rx="4.5" fill="#00cfff" fillOpacity=".7" transform="rotate(-20 60 42)"/>
      <rect x="64" y="50" width="22" height="9" rx="4.5" fill="#00cfff" fillOpacity=".65" transform="rotate(-15 64 50)"/>
      {/* feet flat */}
      <rect x="82" y="57" width="20" height="6" rx="3" fill="#00cfff" fillOpacity=".65"/>
      <rect x="84" y="50" width="18" height="6" rx="3" fill="#00cfff" fillOpacity=".6"/>
    </svg>
  );
}

// Hijri Card
function HijriCard(){
  const today=new Date();
  const h=gregorianToHijri(today);
  const mi=HIJRI_MONTHS[h.month-1];
  const gr=today.toLocaleDateString("fr-FR",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const daysAr=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  const dayAr=daysAr[today.getDay()];
  return(
    <NeonCard color="#ffd700" style={{padding:"14px 16px",marginBottom:14}}>
      <p style={{color:"rgba(255,255,255,.35)",fontSize:10,margin:"0 0 6px",textTransform:"uppercase",letterSpacing:1}}>📅 Calendrier Hégirien — Aujourd'hui</p>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <p style={{color:"#ffd700",fontWeight:800,fontSize:24,margin:"0 0 2px"}}>{h.day} {mi.name} {h.year} H</p>
          <p style={{fontFamily:"'Amiri',serif",color:"#ffd700aa",fontSize:18,direction:"rtl",margin:"0 0 4px"}}>{dayAr} {h.day} {mi.arabic} {h.year} هـ</p>
          <p style={{color:"rgba(255,255,255,.35)",fontSize:11,fontStyle:"italic",margin:"0 0 2px"}}>🔊 {h.day} {mi.phonetic} {h.year}</p>
          <p style={{color:"rgba(255,255,255,.3)",fontSize:11,margin:0}}>➜ {gr}</p>
        </div>
        <span style={{fontSize:40,marginLeft:8}}>🌙</span>
      </div>
    </NeonCard>
  );
}

function ProphetsPage({setPage}){
  const[sel,setSel]=useState(null);
  const[story,setStory]=useState(null);
  if(story){
    const p=story;
    return(
      <div style={{padding:"0 16px 32px"}}>
        <BackBtn onBack={()=>setStory(null)}/>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <span style={{fontSize:36}}>{p.icon}</span>
          <div><h1 style={{color:"white",fontSize:22,fontWeight:800,margin:0}}>{p.name}</h1><AB arabic={p.arabic} phonetic={p.phonetic} trans={p.trans} color={p.color} size={12}/></div>
        </div>
        {p.story.map((s,i)=>(
          <NeonCard key={i} color={p.color} style={{padding:"14px 16px",marginBottom:10}}>
            <p style={{color:p.color,fontWeight:700,fontSize:14,margin:"0 0 8px"}}>📖 {s.title}</p>
            <p style={{color:"rgba(255,255,255,.8)",fontSize:13,lineHeight:1.7,margin:0}}>{s.text}</p>
          </NeonCard>
        ))}
      </div>
    );
  }
  return(
    <div style={{padding:"0 16px 32px"}}>
      <BackBtn onBack={()=>setPage("home")}/>
      <h1 style={{color:"white",fontSize:24,fontWeight:800,margin:"0 0 2px"}}>Les Prophètes</h1>
      <p style={{color:"rgba(255,255,255,.4)",margin:"0 0 14px"}}>25 prophètes · ordre chronologique · appuie pour lire l'histoire</p>
      {PROPHETS.map((p,i)=>(
        <NeonCard key={p.id} color={p.color} onClick={()=>setStory(p)} style={{padding:"12px 14px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:40}}>
              <span style={{background:`${p.color}22`,border:`1px solid ${p.color}55`,borderRadius:10,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{p.icon}</span>
              <span style={{color:p.color,fontSize:10,fontWeight:700,marginTop:2}}>#{i+1}</span>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <p style={{color:"white",fontWeight:700,fontSize:14,margin:0}}>{p.name}</p>
                <span style={{color:"rgba(255,255,255,.35)",fontSize:11}}>— {p.trans}</span>
              </div>
              <p style={{color:"rgba(255,255,255,.4)",fontSize:11,margin:"2px 0 4px"}}>{p.desc}</p>
              <AB arabic={p.arabic} phonetic={p.phonetic} trans={p.trans} color={p.color} size={11}/>
            </div>
            <span style={{color:`${p.color}88`,fontSize:16,alignSelf:"center"}}>›</span>
          </div>
        </NeonCard>
      ))}
    </div>
  );
}

function PillarsPage({setPage}){
  const[sel,setSel]=useState(null);
  return(
    <div style={{padding:"0 16px 32px"}}>
      <BackBtn onBack={()=>setPage("home")}/>
      <div style={{textAlign:"center",marginBottom:14}}><div style={{fontSize:52}}>🕌</div></div>
      {PILLARS.map(p=>(
        <NeonCard key={p.num} color={p.color} onClick={()=>setSel(sel===p.num?null:p.num)} style={{padding:"14px 16px",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{background:`${p.color}22`,borderRadius:"50%",width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,border:`1px solid ${p.color}44`,flexShrink:0}}>{p.icon}</div>
            <div style={{flex:1}}>
              <span style={{background:p.color,color:"#000",fontSize:10,fontWeight:800,borderRadius:20,padding:"2px 10px",marginBottom:4,display:"inline-block"}}>Pilier {p.num}</span>
              <p style={{color:"white",fontWeight:700,fontSize:14,margin:"3px 0 4px"}}>{p.name}</p>
              <AB arabic={p.arabic} phonetic={p.phonetic} trans={p.trans} color={p.color} size={11}/>
              {sel===p.num&&(<div style={{marginTop:8,borderTop:"1px solid rgba(255,255,255,.1)",paddingTop:8}}><p style={{color:"rgba(255,255,255,.75)",fontSize:12,lineHeight:1.6,margin:"0 0 8px"}}>{p.detail}</p><AB arabic={p.arabic2} phonetic={p.phonetic2} trans="" color={p.color} size={12}/></div>)}
            </div>
            <span style={{color:`${p.color}88`,fontSize:16,alignSelf:"center"}}>{sel===p.num?"▾":"›"}</span>
          </div>
        </NeonCard>
      ))}
    </div>
  );
}

function QiblaPage({setPage}){
  const[times,setTimes]=useState(null);
  const[status,setStatus]=useState("Chargement de votre position…");
  const[angle,setAngle]=useState(135);
  useEffect(()=>{
    const id=setInterval(()=>setAngle(a=>(a+0.3)%360),50);
    return()=>clearInterval(id);
  },[]);
  useEffect(()=>{
    if(!navigator.geolocation){setStatus("Géolocalisation non disponible.");return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      const t=calcPrayerTimes(lat,lng,Date.now());
      setTimes(t);
      setStatus(null);
    },err=>{setStatus("⚠️ Autorisation refusée. Activez la géolocalisation dans les réglages.");});
  },[]);
  return(
    <div style={{padding:"0 16px 32px"}}>
      <BackBtn onBack={()=>setPage("home")}/>
      <h1 style={{color:"white",fontSize:22,fontWeight:800,margin:"0 0 4px"}}>Prière & Qibla</h1>
      <HijriCard/>
      <div style={{position:"relative",width:190,height:190,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"3px solid #00cfff",boxShadow:"0 0 28px #00cfff55"}}/>
        <div style={{position:"absolute",inset:12,borderRadius:"50%",border:"1px solid rgba(255,255,255,.08)"}}/>
        {["N","E","S","O"].map((d,i)=>(<span key={d} style={{position:"absolute",color:"rgba(255,255,255,.5)",fontSize:12,fontWeight:700,top:i===0?4:i===2?"auto":"50%",bottom:i===2?4:"auto",left:i===3?4:i===1?"auto":"50%",right:i===1?4:"auto",transform:(i===0||i===2)?"translateX(-50%)":"translateY(-50%)"}}>{d}</span>))}
        <div style={{position:"absolute",width:3,height:76,background:"linear-gradient(#ffd700,transparent)",bottom:"50%",left:"calc(50% - 1.5px)",transformOrigin:"bottom center",transform:`rotate(${angle}deg)`,borderRadius:3}}/>
        <div style={{width:32,height:32,background:"#0a0f23",border:"2px solid #ffd700",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,boxShadow:"0 0 10px #ffd70088"}}>🕋</div>
      </div>
      <NeonCard color="#ffd700" style={{padding:"12px 14px"}}>
        <p style={{color:"#ffd700",fontWeight:700,margin:"0 0 8px",fontSize:13}}>⏰ Horaires du jour</p>
        {status&&<p style={{color:"rgba(255,255,255,.5)",fontSize:12,margin:"0 0 8px",fontStyle:"italic"}}>{status}</p>}
        {PRAYERS.map(p=>(
          <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span>{p.icon}</span>
              <div><span style={{color:"white",fontWeight:600,fontSize:13}}>{p.name}</span><span style={{color:"rgba(255,255,255,.3)",fontSize:10,marginLeft:5,fontStyle:"italic"}}>{p.phonetic}</span></div>
            </div>
            <span style={{color:p.color,fontWeight:800,fontSize:15}}>{times?times[p.name.toLowerCase()]||"--:--":"--:--"}</span>
          </div>
        ))}
        {!status&&<p style={{color:"rgba(255,255,255,.25)",fontSize:10,margin:"8px 0 0",textAlign:"center"}}>Basé sur votre position GPS actuelle</p>}
      </NeonCard>
    </div>
  );
}

function GameQuiSuisJe(){
  const[order]=useState(()=>shuffleArray([...Array(QSJ_DATA.length).keys()]));
  const[pos,setPos]=useState(0);
  const[clue,setClue]=useState(0);
  const[revealed,setRevealed]=useState(false);
  const[score,setScore]=useState(0);
  const[guessedFirst,setGuessedFirst]=useState(false);
  const p=QSJ_DATA[order[pos%order.length]];
  const next=()=>{setPos(x=>x+1);setClue(0);setRevealed(false);setGuessedFirst(false);};
  const reveal=(firstTry)=>{if(firstTry)setScore(s=>s+1);setGuessedFirst(firstTry);setRevealed(true);};
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{color:"rgba(255,255,255,.4)",fontSize:12}}>Personnage {(pos%order.length)+1}/{order.length}</span>
        <span style={{color:"#ffd700",fontWeight:700}}>Score : {score} ⭐</span>
      </div>
      {/* Progress bar indices */}
      <div style={{display:"flex",gap:4,marginBottom:12}}>
        {p.clues.map((_,i)=>(<div key={i} style={{flex:1,height:4,borderRadius:4,background:i<=clue?"#00ff88":"rgba(255,255,255,.15)"}}/>))}
      </div>
      <NeonCard color="#00ff88" style={{padding:"16px",marginBottom:10}}>
        <p style={{color:"#00ff88",fontSize:12,fontWeight:700,margin:"0 0 8px"}}>🔍 Indice {clue+1}/4</p>
        <p style={{color:"white",fontSize:14,lineHeight:1.7,margin:0,fontStyle:"italic"}}>"{p.clues[clue]}"</p>
      </NeonCard>
      {!revealed?(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {clue<3&&<button onClick={()=>setClue(c=>c+1)} style={{padding:"13px",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.2)",borderRadius:12,color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>💡 Indice suivant ({clue+2}/4)</button>}
          <button onClick={()=>reveal(clue===0)} style={{padding:"13px",background:"#ffd700",border:"none",borderRadius:12,color:"#000",fontWeight:800,fontSize:14,cursor:"pointer"}}>
            {clue===0?"🏆 Je sais ! (max points)":"🔍 Révéler la réponse"}
          </button>
        </div>
      ):(
        <div>
          <NeonCard color={guessedFirst?"#ffd700":"#00cfff"} style={{padding:"14px",textAlign:"center",marginBottom:10}}>
            <p style={{color:"rgba(255,255,255,.5)",fontSize:11,margin:"0 0 4px"}}>{guessedFirst?"🏆 Bravo dès le 1er indice !":"Réponse :"}</p>
            <p style={{color:"white",fontWeight:800,fontSize:20,margin:0}}>{p.name}</p>
          </NeonCard>
          <button onClick={next} style={{width:"100%",padding:"13px",background:"#00ff88",border:"none",borderRadius:12,color:"#000",fontWeight:800,fontSize:14,cursor:"pointer"}}>▶️ Personnage suivant</button>
        </div>
      )}
    </div>
  );

function GameMemoire(){
  const items=["☝️ Shahada","🧎 Salat","🌙 Sawm","💝 Zakat","🕋 Hajj","📖 Coran","🌿 Adam","⛵ Nûh","🔥 Ibrahim","⚡ Mûsa","🐋 Yunus","🌙 Muhammad ﷺ"];
  const pairs=[...items,...items];
  const[cards,setCards]=useState(()=>shuffleArray(pairs.map((v,i)=>({id:i,val:v,flipped:false,matched:false}))));
  const[selected,setSel]=useState([]);const[moves,setMoves]=useState(0);
  const flip=idx=>{
    if(selected.length===2||cards[idx].flipped||cards[idx].matched)return;
    const nc=[...cards];nc[idx]={...nc[idx],flipped:true};setCards(nc);
    const ns=[...selected,idx];setSel(ns);
    if(ns.length===2){
      setMoves(m=>m+1);
      if(nc[ns[0]].val===nc[ns[1]].val){const mc=[...nc];mc[ns[0]]={...mc[ns[0]],matched:true};mc[ns[1]]={...mc[ns[1]],matched:true};setCards(mc);setSel([]);}
      else setTimeout(()=>{const rc=[...nc];rc[ns[0]]={...rc[ns[0]],flipped:false};rc[ns[1]]={...rc[ns[1]],flipped:false};setCards(rc);setSel([]);},900);
    }
  };
  const won=cards.every(c=>c.matched);
  const reset=()=>{setCards(shuffleArray(pairs.map((v,i)=>({id:i,val:v,flipped:false,matched:false}))));setSel([]);setMoves(0);};
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{color:"rgba(255,255,255,.4)",fontSize:12}}>Retourne les paires identiques</span><span style={{color:"#ffd700",fontWeight:700}}>Coups : {moves}</span></div>
      {won&&<div style={{textAlign:"center",marginBottom:12}}><p style={{color:"#00ff88",fontWeight:800,fontSize:18}}>🎉 Bravo ! {moves} coups</p><button onClick={reset} style={{padding:"10px 20px",background:"#00ff88",border:"none",borderRadius:10,color:"#000",fontWeight:800,cursor:"pointer"}}>🔁 Rejouer</button></div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {cards.map((c,i)=>(
          <div key={c.id} onClick={()=>flip(i)} style={{height:60,borderRadius:10,background:c.flipped||c.matched?"rgba(0,207,255,.15)":"rgba(255,255,255,.06)",border:`2px solid ${c.matched?"#00ff88":c.flipped?"#00cfff":"rgba(255,255,255,.15)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:c.flipped||c.matched?"default":"pointer",transition:"all .2s",fontSize:c.flipped||c.matched?11:18}}>
            {c.flipped||c.matched?<span style={{color:"white",textAlign:"center",lineHeight:1.2}}>{c.val}</span>:"❓"}
          </div>
        ))}
      </div>
    </div>
  );
}

function buildQ(lk,cat=null){
  if(lk==="mensuel"){
    const month=new Date().getMonth()+1;
    const pack=MONTHLY_PACKS[month];
    return pack?shuffleArray(pack.questions):shuffleArray(ALL_QUIZ_QUESTIONS.filter(q=>q.niv===1)).slice(0,10);
  }
  let pool=cat?ALL_QUIZ_QUESTIONS.filter(q=>q.cat===cat):ALL_QUIZ_QUESTIONS;
  // Real level differentiation by niv field
  if(lk==="facile") pool=ALL_QUIZ_QUESTIONS.filter(q=>q.niv===1);
  if(lk==="moyen")  pool=ALL_QUIZ_QUESTIONS.filter(q=>q.niv<=2);
  if(lk==="difficile") pool=ALL_QUIZ_QUESTIONS.filter(q=>q.niv===3);
  if(lk==="marathon")  pool=ALL_QUIZ_QUESTIONS; // all levels mixed
  const counts={facile:10,moyen:15,difficile:20,marathon:40,thematic:10};
  const count=counts[lk]||10;
  return shuffleArray(pool).slice(0,Math.min(count,pool.length));
}

            <button onClick={()=>setEditing(true)} style={{background:"rgba(255,255,255,.08)",border:"none",color:"rgba(255,255,255,.5)",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11}}>✏️ Changer</button>

            <p style={{color:"rgba(255,255,255,.5)",margin:0}}>Aucun score encore. Lance un quiz et entre ton pseudo pour apparaître ici !</p>
          </NeonCard>
        ):(
          sorted.map((e,i)=>(
            <div key={e.name} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12,marginBottom:8,
              background:e.name===myName?"rgba(255,215,0,.1)":"rgba(255,255,255,.04)",
              border:`1px solid ${e.name===myName?"#ffd700":"rgba(255,255,255,.08)"}`}}>
              <span style={{fontSize:22,minWidth:28}}>{MEDALS[i]||`${i+1}`}</span>
              <div style={{flex:1}}>
                <p style={{color:e.name===myName?"#ffd700":"white",fontWeight:700,fontSize:14,margin:"0 0 2px"}}>{e.name}{e.name===myName?" 👤":""}</p>
                <p style={{color:"rgba(255,255,255,.4)",fontSize:11,margin:0}}>Meilleur : {e.best}% · Parties : {e.games}</p>
              </div>
              <div style={{textAlign:"right"}}>
                <p style={{color:"#ffd700",fontWeight:800,fontSize:18,margin:0}}>{e.best}%</p>
                <p style={{color:"rgba(255,255,255,.3)",fontSize:10,margin:0}}>🔥{e.streak}</p>
              </div>
            </div>
          ))
        )}
        {myName&&lb.find(e=>e.name===myName)&&(
          <button onClick={clearMy} style={{width:"100%",marginTop:12,padding:"10px",background:"rgba(255,68,68,.1)",border:"1px solid #ff4444",borderRadius:10,color:"#ff4444",fontWeight:600,fontSize:12,cursor:"pointer"}}>🗑️ Supprimer mon score</button>
        )}
        <p style={{color:"rgba(255,255,255,.2)",fontSize:10,textAlign:"center",margin:"12px 0 0"}}>Les scores sont sauvegardés sur cet appareil. Partagez vos scores avec vos amis pour vous challenger !</p>
      </div>
    </div>
  );
}

function QuizJeuxPage({setPage}){
  const[tab,setTab]=useState("quiz");
  const[level,setLevel]=useState(null);
  const[cat,setCat]=useState(null);
  const[questions,setQuestions]=useState([]);
  const[qIndex,setQIndex]=useState(0);
  const[selected,setSelected]=useState(null);
  const[score,setScore]=useState(0);
  const[done,setDone]=useState(false);
  const[streak,setStreak]=useState(0);
  const[bestStreak,setBest]=useState(0);
  const[showLB,setShowLB]=useState(false);
  const[myName,setMyName]=useState(()=>loadMyName());
  const[lb,setLb]=useState(()=>loadLeaderboard());
  const[showNamePrompt,setShowNamePrompt]=useState(false);
  const[pendingScore,setPendingScore]=useState(null);
  const[activeGame,setActiveGame]=useState(null);

  const startQuiz=(lk,c=null)=>{
    setQuestions(buildQ(lk,c));setLevel(lk);setCat(c);
    setQIndex(0);setSelected(null);setScore(0);setDone(false);setStreak(0);setBest(0);
  };
  const handleAnswer=i=>{
    if(selected!==null)return;
    setSelected(i);
    const ok=i===questions[qIndex].correct;
    if(ok){setScore(s=>s+1);setStreak(s=>{const ns=s+1;if(ns>bestStreak)setBest(ns);return ns;});}
    else setStreak(0);
    setTimeout(()=>{if(qIndex+1>=questions.length)setDone(true);else{setQIndex(q=>q+1);setSelected(null);}},1300);
  };
  const saveScore=(pct,bs)=>{
    if(!myName){setPendingScore({pct,bs});setShowNamePrompt(true);return;}
    commitScore(myName,pct,bs);
  };
  const commitScore=(name,pct,bs)=>{
    const prev=lb.find(e=>e.name===name);
    let nl;
    if(prev){nl=lb.map(e=>e.name===name?{...e,best:Math.max(e.best,pct),games:e.games+1,streak:Math.max(e.streak,bs)}:e);}
    else{nl=[...lb,{name,best:pct,games:1,streak:bs}];}
    saveLeaderboard(nl);setLb(nl);
  };
  const reset=()=>{setLevel(null);setCat(null);setQuestions([]);setQIndex(0);setSelected(null);setScore(0);setDone(false);setStreak(0);setActiveGame(null);};

  // Monthly quiz intro screen
  if(level==="mensuel"&&questions.length===0){
    const month=new Date().getMonth()+1;
    const pack=MONTHLY_PACKS[month];
    return(
      <div style={{padding:"0 16px 32px"}}>
        <BackBtn onBack={reset}/>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:60,marginBottom:8}}>{pack?.icon||"🗓️"}</div>
          <h1 style={{color:"#ff8c00",fontSize:22,fontWeight:800,margin:"0 0 4px"}}>Quiz du Mois</h1>
          <p style={{color:"white",fontWeight:700,fontSize:16,margin:"0 0 4px"}}>{pack?.month} — {pack?.theme}</p>
          <p style={{color:"rgba(255,255,255,.4)",fontSize:12}}>Nouvelles questions chaque mois !</p>
        </div>
        <NeonCard color="#ff8c00" style={{padding:"16px",marginBottom:20,textAlign:"center"}}>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:13,margin:"0 0 8px"}}>Ce mois-ci : <span style={{color:"#ff8c00",fontWeight:700}}>{pack?.questions?.length||0} questions</span> sur le thème :</p>
          <p style={{color:"white",fontWeight:800,fontSize:16,margin:0}}>{pack?.icon} {pack?.theme}</p>
        </NeonCard>
        <NeonCard color="#ffd700" style={{padding:"12px 14px",marginBottom:16}}>
          <p style={{color:"#ffd700",fontWeight:700,fontSize:12,margin:"0 0 4px"}}>📅 Comment ça marche ?</p>
          <p style={{color:"rgba(255,255,255,.6)",fontSize:12,margin:0,lineHeight:1.6}}>Chaque mois, un nouveau thème + de nouvelles questions sont ajoutés. Reviens le mois prochain pour de nouvelles surprises !</p>
        </NeonCard>
        <button onClick={()=>startQuiz("mensuel")} style={{width:"100%",padding:"15px",background:"#ff8c00",border:"none",borderRadius:14,color:"white",fontWeight:800,fontSize:16,cursor:"pointer",boxShadow:"0 0 20px #ff8c0055"}}>
          🚀 Commencer le quiz de {pack?.month}
        </button>
      </div>
    );
  }

  // Active quiz
  if(level&&level!=="thematic"&&level!=="mensuel"&&questions.length>0&&!done||(level==="mensuel"&&questions.length>0&&!done)){
    const q=questions[qIndex];const progress=(qIndex/questions.length)*100;const cc=CC[q.cat]||"#ff8c00";
    return(
      <div style={{padding:"0 16px 32px"}}>
        <BackBtn onBack={reset}/>
        <div style={{background:"rgba(255,255,255,.08)",borderRadius:10,height:6,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#00cfff,#bf5fff)",borderRadius:10,transition:"width .4s"}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <span style={{color:"rgba(255,255,255,.4)",fontSize:12}}>{qIndex+1}/{questions.length}</span>
            <span style={{background:`${cc}22`,color:cc,border:`1px solid ${cc}44`,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600}}>{q.cat}</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {streak>=2&&<span style={{color:"#ff8c00",fontWeight:700,fontSize:12}}>{streak}🔥</span>}
            <span style={{color:"#ffd700",fontWeight:700,fontSize:13}}>✓ {score}</span>
          </div>
        </div>
        <NeonCard color={cc} style={{padding:"16px",marginBottom:16}}><p style={{color:"white",fontSize:15,fontWeight:700,margin:0,lineHeight:1.6}}>{q.q}</p></NeonCard>
        {q.answers.map((a,i)=>{
          let bc="rgba(255,255,255,.15)",bg="rgba(10,15,35,.85)",glow="none";
          if(selected!==null){if(i===q.correct){bc="#00ff88";bg="rgba(0,255,136,.08)";glow="0 0 12px #00ff8855";}else if(i===selected){bc="#ff4444";bg="rgba(255,68,68,.08)";glow="0 0 12px #ff444455";}}else bc="#00cfff44";
          return(<button key={i} onClick={()=>handleAnswer(i)} style={{width:"100%",padding:"12px 15px",background:bg,border:`2px solid ${bc}`,borderRadius:12,color:"white",textAlign:"left",fontSize:14,cursor:selected!==null?"default":"pointer",marginBottom:8,fontWeight:600,boxShadow:glow,transition:"all .25s",display:"flex",alignItems:"center",gap:9}}>
            <span style={{color:"rgba(255,255,255,.3)",fontSize:12,minWidth:18}}>{["A","B","C","D"][i]}.</span>{a}
            {selected!==null&&i===q.correct&&<span style={{marginLeft:"auto"}}>✅</span>}
            {selected!==null&&i===selected&&i!==q.correct&&<span style={{marginLeft:"auto"}}>❌</span>}
          </button>);
        })}
      </div>
    );
  }

  // Done screen
  if(done){
    const pct=Math.round((score/questions.length)*100);
    return(
      <div style={{padding:"0 16px 32px",textAlign:"center"}}>
        <BackBtn onBack={reset}/>
        <div style={{fontSize:64,marginTop:14,marginBottom:10}}>{pct>=80?"🎉":pct>=50?"👍":"📚"}</div>
        <h2 style={{color:"white",fontSize:24,fontWeight:800,margin:"0 0 6px"}}>Quiz terminé !</h2>
        <p style={{color:"#ffd700",fontSize:22,fontWeight:800,margin:"0 0 4px"}}>{score}/{questions.length}</p>
        <p style={{color:"rgba(255,255,255,.45)",fontSize:13,marginBottom:12}}>{pct}% de bonnes réponses</p>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:14}}>
          <NeonCard color="#ffd700" style={{padding:"10px 16px",textAlign:"center"}}><p style={{color:"rgba(255,255,255,.5)",fontSize:10,margin:"0 0 2px"}}>Meilleure série</p><p style={{color:"#ffd700",fontWeight:800,fontSize:20,margin:0}}>{bestStreak}🔥</p></NeonCard>
          <NeonCard color="#00ff88" style={{padding:"10px 16px",textAlign:"center"}}><p style={{color:"rgba(255,255,255,.5)",fontSize:10,margin:"0 0 2px"}}>Score</p><p style={{color:"#00ff88",fontWeight:800,fontSize:20,margin:0}}>{pct}%</p></NeonCard>
        </div>
        <p style={{color:"rgba(255,255,255,.55)",marginBottom:14}}>{pct>=80?"MashaAllah, excellent ! 🌟":pct>=50?"Bien joué, continue ! 💪":"Révise et réessaie ! 📖"}</p>

        {/* Save score CTA */}
        {showNamePrompt?(
          <div style={{background:"rgba(255,215,0,.08)",border:"1px solid #ffd700",borderRadius:12,padding:"14px",marginBottom:14}}>
            <p style={{color:"#ffd700",fontWeight:700,margin:"0 0 8px",fontSize:13}}>Entre ton pseudo pour sauvegarder ton score :</p>
            <div style={{display:"flex",gap:8}}>
              <input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="Ton pseudo…" maxLength={20}
                style={{flex:1,background:"rgba(255,255,255,.08)",border:"1px solid #ffd700",borderRadius:10,padding:"10px",color:"white",fontSize:14,outline:"none"}}/>
              <button onClick={()=>{if(myName.trim()){saveMyName(myName.trim());commitScore(myName.trim(),pct,bestStreak);const nl=loadLeaderboard();setLb(nl);setShowNamePrompt(false);}}}
                style={{background:"#ffd700",border:"none",borderRadius:10,padding:"10px 14px",color:"#000",fontWeight:800,cursor:"pointer",fontSize:14}}>✓</button>
            </div>
          </div>
        ):(
          <button onClick={()=>saveScore(pct,bestStreak)} style={{width:"100%",padding:"13px",background:"rgba(255,215,0,.15)",border:"2px solid #ffd700",borderRadius:12,color:"#ffd700",fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:10}}>
            🏆 Sauvegarder mon score dans le classement
          </button>
        )}

        <button onClick={()=>setShowLB(true)} style={{width:"100%",padding:"12px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.15)",borderRadius:12,color:"white",fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:12}}>
          📊 Voir le classement amis
        </button>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>startQuiz(level==="thematic"?"thematic":level,cat)} style={{background:"#ffd700",border:"none",borderRadius:12,padding:"12px 20px",color:"#000",fontWeight:800,fontSize:13,cursor:"pointer"}}>🔁 Rejouer</button>
          <button onClick={reset} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:12,padding:"12px 20px",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>🎯 Changer</button>
        </div>
        {showLB&&<Leaderboard onClose={()=>setShowLB(false)} myName={myName} setMyName={n=>{setMyName(n);saveMyName(n);}}/>}
      </div>
    );
  }

  // Thematic pick
  if(level==="thematic")return(
    <div style={{padding:"0 16px 32px"}}>
      <BackBtn onBack={reset}/>
      <h1 style={{color:"white",fontSize:22,fontWeight:800,margin:"0 0 4px"}}>Choisis une catégorie</h1>
      <p style={{color:"rgba(255,255,255,.4)",margin:"0 0 14px"}}>10 questions aléatoires par thème</p>
      {CATEGORIES.map(c=>{const cnt=ALL_QUIZ_QUESTIONS.filter(q=>q.cat===c).length;const col=CC[c]||"#00cfff";return(
        <NeonCard key={c} color={col} onClick={()=>startQuiz("thematic",c)} style={{padding:"12px 15px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <p style={{color:"white",fontWeight:700,fontSize:14,margin:0}}>{c}</p>
          <span style={{background:col,color:"#000",fontWeight:800,borderRadius:20,padding:"3px 10px",fontSize:11}}>{cnt}Q</span>
        </NeonCard>
      );})}
    </div>
  );

  // Main screen
  return(
    <div style={{padding:"0 16px 32px"}}>
      <BackBtn onBack={()=>setPage("home")}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h1 style={{color:"white",fontSize:22,fontWeight:800,margin:0}}>Quiz & Jeux</h1>
        <button onClick={()=>setShowLB(true)} style={{background:"rgba(255,215,0,.12)",border:"1px solid #ffd700",borderRadius:10,padding:"8px 12px",color:"#ffd700",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>🏆 Classement</button>
      </div>
      <div style={{display:"flex",background:"rgba(255,255,255,.06)",borderRadius:12,padding:4,marginBottom:16}}>
        {[{key:"quiz",label:"🧠 Quiz"},{key:"jeux",label:"🎲 Jeux"}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13,transition:"all .2s",background:tab===t.key?"rgba(255,255,255,.13)":"transparent",color:tab===t.key?"white":"rgba(255,255,255,.38)"}}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==="quiz"?(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{color:"rgba(255,255,255,.4)",fontSize:11,margin:0}}>{ALL_QUIZ_QUESTIONS.length} questions · mélangées à chaque partie</p>
            {myName&&<span style={{color:"#ffd700",fontSize:11}}>👤 {myName}</span>}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {CATEGORIES.map(c=>(<span key={c} style={{background:`${CC[c]||"#fff"}22`,color:CC[c]||"#fff",border:`1px solid ${CC[c]||"#fff"}44`,borderRadius:20,padding:"3px 9px",fontSize:10,fontWeight:600}}>{c}</span>))}
          </div>
          {LEVELS.map(l=>{
            const isMonthly=l.key==="mensuel";
            const month=new Date().getMonth()+1;
            const pack=MONTHLY_PACKS[month];
            return(
              <NeonCard key={l.key} color={l.color} onClick={()=>l.key==="thematic"?setLevel("thematic"):l.key==="mensuel"?setLevel("mensuel"):startQuiz(l.key)} style={{padding:"13px 15px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <p style={{color:"white",fontWeight:700,fontSize:14,margin:"0 0 2px"}}>{l.label}</p>
                    <p style={{color:"rgba(255,255,255,.45)",fontSize:11,margin:0}}>{isMonthly&&pack?`${pack.icon} ${pack.theme}`:l.desc}</p>
                  </div>
                  {l.count>0?<span style={{background:l.color,color:"#000",fontWeight:800,borderRadius:20,padding:"3px 11px",fontSize:12}}>{l.count}Q</span>:isMonthly?<span style={{background:l.color,color:"#000",fontWeight:800,borderRadius:20,padding:"3px 11px",fontSize:12}}>NOUVEAU</span>:null}
                </div>
              </NeonCard>
            );
          })}
        </>
      ):(
        <>
          <p style={{color:"rgba(255,255,255,.4)",fontSize:12,margin:"0 0 12px"}}>4 jeux intégrés — jouez directement ici ! 🎮</p>
          {activeGame?(
            <div>
              <BackBtn onBack={()=>setActiveGame(null)}/>
              <h2 style={{color:"white",fontSize:18,fontWeight:800,margin:"0 0 14px"}}>{REAL_GAMES.find(g=>g.key===activeGame)?.icon} {REAL_GAMES.find(g=>g.key===activeGame)?.name}</h2>
              {activeGame==="quisuisje"&&<GameQuiSuisJe/>}
              {activeGame==="vraifaux"&&<GameVraiFaux/>}
              {activeGame==="memoire"&&<GameMemoire/>}
              {activeGame==="dhikr"&&<GameDhikrRapide/>}
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {REAL_GAMES.map(g=>(<NeonCard key={g.key} color={g.color} onClick={()=>setActiveGame(g.key)} style={{padding:"15px 12px",textAlign:"center"}}><div style={{fontSize:32,marginBottom:6}}>{g.icon}</div><p style={{color:"white",fontWeight:700,fontSize:13,margin:"0 0 3px"}}>{g.name}</p><p style={{color:"rgba(255,255,255,.4)",fontSize:11,margin:0}}>{g.desc}</p></NeonCard>))}
            </div>
          )}
        </>
      )}
      {showLB&&<Leaderboard onClose={()=>setShowLB(false)} myName={myName} setMyName={n=>{setMyName(n);saveMyName(n);}}/>}
    </div>
  );
}

                value={montant} onChange={e=>setMontant(e.target.value)}
                placeholder="Votre montant personnalisé (ex: 3€)"
                style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1px solid #00ff8844",borderRadius:10,padding:"12px",color:"white",fontSize:14,outline:"none",marginBottom:12,boxSizing:"border-box"}}
              />
            )}
            <div style={{background:"rgba(0,255,136,.08)",border:"1px solid #00ff8833",borderRadius:10,padding:"12px",marginBottom:14}}>
              <p style={{color:"rgba(255,255,255,.6)",fontSize:12,margin:"0 0 4px",fontWeight:600}}>💳 Comment faire votre don ?</p>
              <p style={{color:"white",fontSize:13,margin:"0 0 4px"}}>📧 PayPal — lien disponible prochainement</p>
              <p style={{color:"rgba(255,255,255,.4)",fontSize:11,margin:0}}>Vous pouvez aussi laisser une suggestion ci-dessous pour nous indiquer votre mode de paiement préféré.</p>
            </div>
            <button onClick={()=>setDonDone(true)}
              style={{width:"100%",padding:"14px",background:"#00ff88",border:"none",borderRadius:12,color:"#000",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 0 20px #00ff8855"}}>
              💚 J'ai effectué mon don — Merci !
            </button>
          </>
        ):(
          <div style={{textAlign:"center",padding:"10px 0"}}>
            <div style={{fontSize:50,marginBottom:8}}>🎉</div>
            <p style={{color:"#00ff88",fontWeight:800,fontSize:18,margin:"0 0 6px"}}>JazakAllahu Khayran !</p>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:13,lineHeight:1.6,margin:0}}>
              Qu'Allah vous récompense au centuple pour votre générosité. Votre soutien nous aide à faire grandir cette application pour toute la Oumma 🌙
            </p>
          </div>
        )}
      </NeonCard>

      {/* Section suggestion */}
      <NeonCard color="#00cfff" style={{padding:"16px",marginBottom:16}}>
        <p style={{color:"#00cfff",fontWeight:800,fontSize:15,margin:"0 0 4px"}}>💡 Faire une suggestion</p>
        <p style={{color:"rgba(255,255,255,.55)",fontSize:12,margin:"0 0 14px",lineHeight:1.5}}>
          Une idée pour améliorer l'app ? Un contenu à ajouter ? Une erreur à corriger ? Écrivez-nous — chaque suggestion est lue avec attention.
        </p>
        {!sent?(
          <>
            <input
              value={pseudo} onChange={e=>setPseudo(e.target.value)}
              placeholder="Votre prénom ou pseudo (facultatif)"
              style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1px solid #00cfff44",borderRadius:10,padding:"10px 12px",color:"white",fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}
            />
            <textarea
              value={suggestion} onChange={e=>setSuggestion(e.target.value)}
              placeholder="Décrivez votre suggestion ou idée d'amélioration…"
              rows={5}
              style={{width:"100%",background:"rgba(255,255,255,.08)",border:"1px solid #00cfff44",borderRadius:10,padding:"12px",color:"white",fontSize:13,outline:"none",resize:"none",marginBottom:12,boxSizing:"border-box",lineHeight:1.6}}
            />
            <button onClick={saveSuggestion} disabled={!suggestion.trim()}
              style={{width:"100%",padding:"14px",background:suggestion.trim()?"#00cfff":"rgba(255,255,255,.1)",border:"none",borderRadius:12,color:"#000",fontWeight:800,fontSize:15,cursor:suggestion.trim()?"pointer":"not-allowed",opacity:suggestion.trim()?1:.5}}>
              📨 Envoyer ma suggestion
            </button>
          </>
        ):(
          <div style={{textAlign:"center",padding:"10px 0"}}>
            <div style={{fontSize:50,marginBottom:8}}>✅</div>
            <p style={{color:"#00cfff",fontWeight:800,fontSize:17,margin:"0 0 6px"}}>Merci pour votre suggestion !</p>
            <p style={{color:"rgba(255,255,255,.6)",fontSize:13,lineHeight:1.6,margin:"0 0 14px"}}>
              Elle a été enregistrée. Nous faisons de notre mieux pour intégrer vos idées à chaque mise à jour mensuelle InshAllah.
            </p>
            <button onClick={()=>setSent(false)} style={{padding:"10px 20px",background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:10,color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              + Ajouter une autre suggestion
            </button>
          </div>
        )}
      </NeonCard>

      {/* Contact */}
      <NeonCard color="#bf5fff" style={{padding:"14px 16px"}}>
        <p style={{color:"#bf5fff",fontWeight:800,fontSize:14,margin:"0 0 8px"}}>📬 Nous contacter</p>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:12,lineHeight:1.6,margin:"0 0 6px"}}>Utilisez le formulaire de suggestion ci-dessus. Nous lisons chaque message avec attention InshAllah.</p>
        <p style={{color:"rgba(255,255,255,.4)",fontSize:11,margin:0}}>Barakallahu fik pour votre soutien 🌙</p>
      </NeonCard>
    </div>
  );
}
