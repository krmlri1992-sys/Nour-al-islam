      { title: "Le pardon et la gloire", text: "Durant la famine, ses fr\xE8res vinrent demander de l'aide sans le reconna\xEEtre. Y\xFBsuf se r\xE9v\xE9la puis dit : 'Pas de reproche sur vous aujourd'hui. Allah vous pardonnera. Il est le plus Mis\xE9ricordieux des mis\xE9ricordieux.'" }
    ] },
    { id: 12, name: "Ayyub", arabic: "\u0623\u064E\u064A\u064F\u0651\u0648\u0628", phonetic: "Ayyoub", trans: "Job", desc: "Le proph\xE8te de la patience", icon: "\u{1F4AA}", color: "#00cfff", story: [
      { title: "L'\xE9preuve supr\xEAme", text: "Ayyub \xE9tait riche, en bonne sant\xE9, avec une grande famille. Allah l'\xE9prouva en lui \xF4tant tout : ses biens, ses enfants et sa sant\xE9. Il souffrit de maladie pendant de longues ann\xE9es, mais ne cessa jamais d'\xEAtre reconnaissant." },
      { title: "La pri\xE8re de la d\xE9tresse", text: "Apr\xE8s ses longues souffrances, Ayyub pria : 'Seigneur, l'adversit\xE9 m'a touch\xE9 et Tu es le plus Mis\xE9ricordieux.' Allah exau\xE7a imm\xE9diatement sa pri\xE8re. C'est de l\xE0 que vient la Dou'a de la d\xE9tresse." },
      { title: "La r\xE9compense divine", text: "Allah gu\xE9rit Ayyub, lui rendit sa famille et doubla ses biens. Le Coran dit : 'Nous avons trouv\xE9 en lui un homme excellent, souvent repentant.' Ayyub est le symbole de la patience absolue en Allah." }
    ] },
    { id: 13, name: "Shu'ayb", arabic: "\u0634\u064F\u0639\u064E\u064A\u0652\u0628", phonetic: "Chou'ayb", trans: "Jethro", desc: "L'\xE9loquent des proph\xE8tes", icon: "\u2696\uFE0F", color: "#ffd700", story: [
      { title: "La fraude dans les march\xE9s", text: "Shu'ayb fut envoy\xE9 au peuple de Madyan qui fraudait dans les mesures et les poids. Il les appela : 'Adorez Allah, ne fraudez pas dans la mesure. Je vous vois dans le bien-\xEAtre mais je crains pour vous le ch\xE2timent.'" },
      { title: "Le rejet", text: "Les notables r\xE9pondirent avec arrogance : 'Tes pri\xE8res t'ordonnent-elles d'abandonner ce que nos p\xE8res adoraient ?' Ils mena\xE7\xE8rent Shu'ayb et ses croyants." },
      { title: "La punition divine", text: "Le peuple de Madyan nia les avertissements. Une terrible secousse les frappa et ils p\xE9rirent. Comme si Madyan n'avait jamais exist\xE9. Shu'ayb et les croyants furent sauv\xE9s." }
    ] },
    { id: 14, name: "M\xFBsa", arabic: "\u0645\u064F\u0648\u0633\u064E\u0649", phonetic: "Mouss\xE2", trans: "Mo\xEFse", desc: "Celui qu'Allah a interpell\xE9", icon: "\u26A1", color: "#ffdd00", story: [
      { title: "Sauv\xE9 des eaux", text: "\xC0 la naissance de M\xFBsa, le pharaon faisait tuer les nouveau-n\xE9s h\xE9breux. Sa m\xE8re le d\xE9posa dans un panier sur le Nil sur inspiration d'Allah. Le panier fut recueilli par la famille du pharaon, et M\xFBsa grandit dans le palais royal." },
      { title: "Le Buisson ardent", text: "Des ann\xE9es plus tard, M\xFBsa vit un buisson en feu qui ne se consumait pas. Allah lui parla directement : 'Je suis Allah, il n'y a pas de dieu sauf Moi. Enl\xE8ve tes sandales, tu es dans la vall\xE9e sacr\xE9e de Tuwa.' M\xFBsa re\xE7ut sa mission proph\xE9tique." },
      { title: "Face au Pharaon", text: "M\xFBsa et son fr\xE8re Harun all\xE8rent voir le Pharaon et lui dirent : 'Lib\xE8re les Fils d'Isra\xEBl !' Le Pharaon refusa avec arrogance. Allah envoya dix fl\xE9aux sur l'\xC9gypte. Les magiciens du pharaon, apr\xE8s avoir vu le miracle de M\xFBsa, se convertirent \xE0 l'Islam." },
      { title: "La travers\xE9e de la mer", text: "M\xFBsa et son peuple fuirent. Le pharaon les poursuivit avec son arm\xE9e. Au bord de la mer, M\xFBsa frappa l'eau avec son b\xE2ton : la mer se fendit en deux. Les Fils d'Isra\xEBl travers\xE8rent. Le Pharaon et son arm\xE9e furent engloutis." }
    ] },
    { id: 15, name: "Harun", arabic: "\u0647\u064E\u0627\u0631\u064F\u0648\u0646", phonetic: "H\xE2ro\xFBn", trans: "Aaron", desc: "Fr\xE8re et aide de M\xFBsa", icon: "\u{1F5E3}\uFE0F", color: "#00ff88", story: [
      { title: "Le soutien de M\xFBsa", text: "M\xFBsa demanda \xE0 Allah : 'Donne-moi un aide de ma famille, mon fr\xE8re Harun \u2014 raffermis ma force par lui et associe-le \xE0 mon affaire.' Allah accorda cette demande et fit de Harun un proph\xE8te aux c\xF4t\xE9s de son fr\xE8re." },
      { title: "La mission commune", text: "Harun \xE9tait \xE9loquent et aidait M\xFBsa \xE0 transmettre le message au Pharaon et au peuple. Ensemble, ils affrontent les d\xE9fis avec foi et confiance en Allah, montrant l'importance de la fraternit\xE9 et de l'entraide dans la mission divine." }
    ] },
    { id: 16, name: "Dawud", arabic: "\u062F\u064E\u0627\u0648\u064F\u062F", phonetic: "D\xE2wo\xFBd", trans: "David", desc: "Le roi proph\xE8te", icon: "\u{1F3B5}", color: "#ffd700", story: [
      { title: "Le jeune berger contre Goliath", text: "Dawud \xE9tait un jeune berger quand l'arm\xE9e d'Isra\xEBl faisait face au g\xE9ant Goliath. Alors que tous avaient peur, Dawud s'avan\xE7a avec sa fronde, invoqua Allah et tua Goliath d'une seule pierre. Allah lui donna ensuite la sagesse et la royaut\xE9." },
      { title: "Le Zabur et la voix m\xE9lodieuse", text: "Allah r\xE9v\xE9la \xE0 Dawud le Zabur (les Psaumes). Sa voix \xE9tait si belle que les oiseaux et les montagnes glorifiaient Allah avec lui. Le Coran dit : '\xD4 David, Nous t'avons fait vicaire sur la Terre. Juge entre les gens avec \xE9quit\xE9.'" },
      { title: "Le roi juste", text: "Dawud r\xE9gna avec justice et sagesse. Il fabriquait lui-m\xEAme des armures pour gagner honn\xEAtement sa vie, donnant l'exemple que m\xEAme un roi doit travailler de ses mains. Allah lui enseigna l'art du travail du m\xE9tal." }
    ] },
    { id: 17, name: "Sulayman", arabic: "\u0633\u064F\u0644\u064E\u064A\u0652\u0645\u064E\u0627\u0646", phonetic: "Soulaym\xE2n", trans: "Salomon", desc: "Le roi des rois", icon: "\u{1F985}", color: "#00ff88", story: [
      { title: "Le roi aux pouvoirs extraordinaires", text: "Allah accorda \xE0 Sulayman un pouvoir unique : commander aux hommes, aux djinns, aux animaux et au vent. Il comprenait le langage des oiseaux et des fourmis. Il pria : 'Accorde-moi un royaume qu'aucun apr\xE8s moi ne pourra avoir.'" },
      { title: "La reine de Saba", text: "Sulayman re\xE7ut une lettre de la reine de Saba Bilqis qui adorait le soleil. Il l'invita \xE0 se soumettre \xE0 Allah. Gr\xE2ce \xE0 la sagesse de Sulayman, Bilqis reconnut la v\xE9rit\xE9 et se convertit \xE0 l'Islam." },
      { title: "Un roi humble", text: "Malgr\xE9 toutes ses richesses et son pouvoir, Sulayman restait humble devant Allah. Quand il vit le palais de Bilqis, il dit : 'Ceci est par la gr\xE2ce de mon Seigneur, pour m'\xE9prouver : serai-je reconnaissant ou ingrat ?'" }
    ] },
    { id: 18, name: "Ilyas", arabic: "\u0625\u0650\u0644\u0652\u064A\u064E\u0627\u0633", phonetic: "Ily\xE2s", trans: "\xC9lie", desc: "Proph\xE8te d'Isra\xEBl", icon: "\u26F0\uFE0F", color: "#ff6b9d", story: [
      { title: "La lutte contre l'idol\xE2trie", text: "Ilyas fut envoy\xE9 aux Fils d'Isra\xEBl qui adoraient Baal, une idole. Il leur dit : 'N'adorez-vous pas Allah ? N'\xE9prouvez-vous pas de la pi\xE9t\xE9 ?' Mais la plupart refus\xE8rent de l'\xE9couter." },
      { title: "L'\xE9l\xE9vation divine", text: "Le Coran mentionne Ilyas parmi les proph\xE8tes et les justes. Allah dit : 'Et Ilyas, il \xE9tait vraiment du nombre des envoy\xE9s.' Il est mentionn\xE9 avec honneur aux c\xF4t\xE9s des grands proph\xE8tes." }
    ] },
    { id: 19, name: "Al-Yasa'", arabic: "\u0627\u0644\u064A\u064E\u0633\u064E\u0639", phonetic: "Al-Yasa'", trans: "\xC9lis\xE9e", desc: "Successeur d'Ilyas", icon: "\u{1F33F}", color: "#00cfff", story: [
      { title: "Le successeur fid\xE8le", text: "Al-Yasa' fut le successeur du proph\xE8te Ilyas. Allah le cite dans le Coran parmi les hommes vertueux : 'Et Isma\xEBl, Al-Yasa', Yunus et Lut \u2014 chacun d'eux, Nous l'avons pr\xE9f\xE9r\xE9 sur les mondes.'" },
      { title: "Un proph\xE8te \xE9lu", text: "Al-Yasa' continua la mission proph\xE9tique en appelant son peuple \xE0 l'adoration d'Allah Seul. Son histoire nous rappelle l'importance de transmettre la guidance de g\xE9n\xE9ration en g\xE9n\xE9ration." }
    ] },
    { id: 20, name: "Yunus", arabic: "\u064A\u064F\u0648\u0646\u064F\u0633", phonetic: "Younous", trans: "Jonas", desc: "L'homme \xE0 la baleine", icon: "\u{1F40B}", color: "#00cfff", story: [
      { title: "La fuite et la baleine", text: "Yunus quitta son peuple sans la permission d'Allah, d\xE9\xE7u de leur refus. Il monta sur un navire qui fut pris dans une temp\xEAte. Les passagers tir\xE8rent au sort pour all\xE9ger le bateau \u2014 le sort tomba sur Yunus. Il fut jet\xE9 \xE0 la mer et aval\xE9 par une grande baleine." },
      { title: "La dou'a dans les t\xE9n\xE8bres", text: "Dans le ventre de la baleine, dans les t\xE9n\xE8bres des profondeurs, Yunus supplia : 'Il n'y a de dieu que Toi. Gloire \xE0 Toi ! J'ai \xE9t\xE9 du nombre des injustes !' Allah exau\xE7a sa pri\xE8re et ordonna \xE0 la baleine de le rejeter sur la rive." },
      { title: "Le retour et la foi", text: "Yunus retourna vers son peuple. Cette fois, ils crurent tous en Allah et furent sauv\xE9s du ch\xE2timent. C'est le seul peuple dans le Coran dont la repentance collective fut accept\xE9e avant le ch\xE2timent." }
    ] },
    { id: 21, name: "Dhul-Kifl", arabic: "\u0630\u064F\u0648 \u0627\u0644\u0643\u0650\u0641\u0652\u0644", phonetic: "Dhoul-Kifl", trans: "\xC9z\xE9chiel", desc: "Le proph\xE8te patient", icon: "\u{1F54A}\uFE0F", color: "#bf5fff", story: [
      { title: "Le proph\xE8te de la responsabilit\xE9", text: "Dhul-Kifl est cit\xE9 dans le Coran aux c\xF4t\xE9s d'Isma'il et Idris comme faisant partie des patients. Son nom signifie 'celui qui a une responsabilit\xE9' ou 'celui de la double r\xE9compense'. Il tint ses engagements envers Allah avec constance." },
      { title: "La patience et la r\xE9compense", text: "Allah dit dans le Coran : 'Et souviens-toi d'Isma'il, d'Idris et de Dhul-Kifl, qui furent tous patients. Nous les avons admis dans Notre mis\xE9ricorde, car ils \xE9taient parmi les gens de bien.'" }
    ] },
    { id: 22, name: "Zakariyya", arabic: "\u0632\u064E\u0643\u064E\u0631\u0650\u064A\u064E\u0651\u0627", phonetic: "Zakariyy\xE2", trans: "Zacharie", desc: "P\xE8re de Yahya", icon: "\u{1F33A}", color: "#ff6b9d", story: [
      { title: "La pri\xE8re du vieil homme", text: "Zakariyya \xE9tait vieux et sa femme \xE9tait st\xE9rile. Mais il ne cessa jamais de prier Allah. Un jour, il vit que la nourriture d'Allah arrivait miraculeusement \xE0 Maryam. Il pria : 'Seigneur, donne-moi de Ta part une bonne descendance. Tu entends les pri\xE8res.'" },
      { title: "L'annonce miraculeuse", text: "Les anges lui annonc\xE8rent la naissance de Yahya. Il s'\xE9tonna : 'Comment aurais-je un enfant alors que je suis vieux et ma femme st\xE9rile ?' Allah dit : 'C'est ainsi \u2014 Allah fait ce qu'Il veut.' Zakariyya rendit gr\xE2ce \xE0 Allah." }
    ] },
    { id: 23, name: "Yahya", arabic: "\u064A\u064E\u062D\u0652\u064A\u064E\u0649", phonetic: "Yahy\xE2", trans: "Jean-Baptiste", desc: "Le saint d\xE8s le berceau", icon: "\u{1F4A7}", color: "#00cfff", story: [
      { title: "Unique en son nom", text: "Allah dit \xE0 Zakariyya : 'Nous lui donnons le nom de Yahya \u2014 Nous n'avons donn\xE9 ce pr\xE9nom \xE0 personne avant lui.' Yahya naquit avec une nature exceptionnelle : sage, pur, pieux d\xE8s son enfance." },
      { title: "La sagesse d\xE8s l'enfance", text: "Allah dit \xE0 Yahya : '\xD4 Yahya, tiens fermement le Livre.' Et Nous lui avons donn\xE9 la sagesse alors qu'il \xE9tait encore enfant, de la tendresse de Notre part, de la puret\xE9. Il \xE9tait pieux, respectueux envers ses parents et non arrogant." }
    ] },
    { id: 24, name: "Issa", arabic: "\u0639\u0650\u064A\u0633\u064E\u0649", phonetic: "\xCEss\xE2", trans: "J\xE9sus", desc: "L'Esprit d'Allah", icon: "\u2728", color: "#00cfff", story: [
      { title: "La naissance miraculeuse", text: "Maryam (Marie), vierge et pieuse, re\xE7ut la visite de l'ange Jibr\xEEl. Il lui annon\xE7a la naissance d'un fils. Elle s'\xE9tonna : 'Comment aurais-je un fils sans qu'un homme m'ait touch\xE9e ?' Allah dit : 'C'est ainsi \u2014 Allah cr\xE9e ce qu'Il veut. Quand Il d\xE9cide quelque chose, Il dit : Sois ! Et cela est.'" },
      { title: "Les miracles d'Issa", text: "Avec la permission d'Allah, Issa parla d\xE8s le berceau, gu\xE9rit les aveugles et les l\xE9preux, ressuscita des morts et cr\xE9a des oiseaux d'argile en leur insufflant la vie. Il re\xE7ut l'Injil (l'\xC9vangile) comme guidance pour les Fils d'Isra\xEBl." },
      { title: "L'\xE9l\xE9vation et le retour", text: "Les m\xE9cr\xE9ants complot\xE8rent pour tuer Issa. Mais Allah l'\xE9leva vers Lui et un autre lui ressembla fut crucifi\xE9 \xE0 sa place. Selon l'Islam, Issa reviendra avant la fin des temps pour \xE9tablir la justice sur Terre." }
    ] },
    { id: 25, name: "Muhammad \uFDFA", arabic: "\u0645\u064F\u062D\u064E\u0645\u064E\u0651\u062F", phonetic: "Mohammad", trans: "Mohammad", desc: "Le Sceau des Proph\xE8tes", icon: "\u{1F319}", color: "#ffd700", story: [
      { title: "L'orphelin de La Mecque", text: "Muhammad \uFDFA naquit \xE0 La Mecque en 570. Son p\xE8re mourut avant sa naissance, sa m\xE8re quand il avait 6 ans. Il fut \xE9lev\xE9 par son grand-p\xE8re puis son oncle Abu Talib. D\xE8s son jeune \xE2ge, il \xE9tait connu pour son honn\xEAtet\xE9 : Al-Amin, 'le Digne de Confiance'." },
      { title: "La premi\xE8re r\xE9v\xE9lation", text: "\xC0 40 ans, retir\xE9 dans la grotte Hir\xE2, l'ange Jibr\xEEl lui apparut et dit : 'Lis !' Muhammad r\xE9pondit : 'Je ne sais pas lire.' Jibr\xEEl le serra fort puis r\xE9p\xE9ta. Les premiers versets du Coran furent r\xE9v\xE9l\xE9s : 'Lis au nom de ton Seigneur qui a cr\xE9\xE9.'" },
      { title: "L'Isra et le Mi'raj", text: "Une nuit, Allah fit voyager Muhammad \uFDFA de La Mecque \xE0 J\xE9rusalem (Al-Isra), puis l'\xE9leva \xE0 travers les cieux (Al-Mi'raj) jusqu'\xE0 une proximit\xE9 divine in\xE9gal\xE9e. C'est lors de ce voyage que les cinq pri\xE8res quotidiennes furent prescrites." },
      { title: "La Hijra et l'Islam universel", text: "Face aux pers\xE9cutions de La Mecque, Muhammad \uFDFA \xE9migra \xE0 M\xE9dine en 622 (la Hijra). En dix ans, l'Islam se r\xE9pandit dans toute la p\xE9ninsule arabique. Muhammad \uFDFA mourut en 632, ayant accompli sa mission : transmettre l'Islam \xE0 l'humanit\xE9 enti\xE8re." }
    ] }
  ];
